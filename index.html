<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Lil Home Hub</title>

  <style>
    @font-face {
      font-family: 'OrbitronBlack';
      src: url('OrbitronBlack-y4XZ.otf') format('opentype');
    }
    @font-face {
      font-family: 'BigNoodleTitling';
      src: url('big_noodle_titling_oblique.ttf') format('truetype');
    }

    :root {
      --color-bg: #8A9A5B;
      --color-card-bg: #ECE580;
      --color-text: #3b3b3b;
      --color-heading: #9069A6;
      --color-nav-bg: #ECBE52;
      --color-nav-active: #D69141;

      --font-heading: 'BigNoodleTitling', sans-serif;
      --font-body: 'OrbitronBlack', sans-serif;
    }

    body {
      font-family: var(--font-body);
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
    }

    header {
      padding: 30px 20px 10px;
      text-align: center;
      border-bottom: 2px solid #ccc;
    }
    header h1 {
      font-family: var(--font-heading);
      color: var(--color-heading);
      margin: 0;
      font-size: 2.5rem;
    }
    #connection-status {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 6px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }
    nav button {
      font-family: var(--font-body);
      font-weight: 600;
      padding: 10px 20px;
      border: none;
      border-radius: 50px;
      background: var(--color-nav-bg);
      cursor: crosshair;
      font-size: 15px;
      transition: transform 0.15s ease;
    }
    nav button:hover {
      transform: translateY(-2px);
    }
    nav button.active {
      background: #D69141;
      color: orange;
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    section {
      display: none;
      background: var(--color-card-bg);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    section.active {
      display: block;
    }
    section h2 {
      font-family: var(--font-heading);
      color: var(--color-heading);
      margin-top: 0;
    }

    .entry-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .entry-form label {
      display: flex;
      flex-direction: column;
      font-size: 14px;
      gap: 4px;
    }
    .entry-form input,
    .entry-form select,
    .entry-form textarea {
      font-family: var(--font-body);
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .entry-form button {
      align-self: flex-start;
      font-family: var(--font-body);
      font-weight: 600;
      padding: 10px 20px;
      border: none;
      border-radius: 50px;
      background: var(--color-nav-active);
      color: white;
      cursor: pointer;
    }

    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .entry-card {
      background: white;
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }
    .entry-card .entry-meta {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 4px;
    }
    .er-warning {
      color: #c0392b;
      font-weight: 700;
      margin-top: 6px;
    }

    .chore-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chore-row {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .chore-done {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .chore-delete {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
      padding: 0 6px;
    }
    .chore-delete:hover {
      color: #c0392b;
    }
  </style>
</head>
<body>

  <header>
    <h1>Our Lil Home Hub</h1>
    <p id="connection-status">Connecting...</p>
  </header>

  <nav>
    <button class="tab-button active" data-tab="Home">Home</button>
    <button class="tab-button" data-tab="diet">Dietary Diary</button>
    <button class="tab-button" data-tab="chores">Chores</button>
    <button class="tab-button" data-tab="budget">Budget</button>
    <button class="tab-button" data-tab="games">Gamba</button>
  </nav>

  <main>
    <section id="Home" class="active">
      <h2>Hello Lover</h2>
      <p>This is the place we call home. It allows all of our musings to co-exist</p>
    </section>

    <section id="diet">
      <h2>Dietary Diary</h2>
      <p>How did that meal make you feel today?</p>

      <form id="diet-form" class="entry-form">
        <label>Date
          <input type="date" id="diet-date" required>
        </label>
        <label>Meal
          <select id="diet-meal">
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Snack</option>
          </select>
        </label>
        <label>What did you eat?
          <input type="text" id="diet-food" required>
        </label>
        <label>Brain fog (0 = clear headed, 5 = so foggy)
          <select
